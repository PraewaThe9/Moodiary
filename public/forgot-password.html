<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ลืมรหัสผ่าน - Moodiary</title>
    <style>
        @font-face {
            font-family: 'biscuit2';
            src: url('../fonts/biscuit2.ttf') format('opentype');
        }
        body { font-family: 'biscuit2', sans-serif; }
    </style>
</head>
<body class="bg-[#e7e1ca] flex items-center justify-center min-h-screen p-4">
    <div class="bg-black w-full max-w-4xl flex flex-col md:flex-row rounded-[2.5rem] overflow-hidden shadow-2xl ">
        <!-- Sidebar -->
        <div class="md:w-[25%] bg-[#e7e1ca] p-10 flex flex-col items-start justify-start ">
            <div class="w-14 h-14 bg-white rounded-2xl mb-6 shadow-lg shadow-white/5 flex items-center justify-center overflow-hidden">
    <img src="images/Moodairylogo.png" alt="Logo" class="w-full h-full object-contain p-2">
</div> 
            <h2 class="text-[#f36942] text-2xl font-medium">กู้คืนรหัสผ่าน</h2>
            <p class="text-[#0a9da7] text-sm mt-1">ยืนยันอีเมลของคุณ</p>
        </div>

        <!-- Content -->
        <div class="md:w-3/4 bg-white p-8 md:p-14">
            <h1 class="text-center text-3xl font-bold text-[#0a9da7] tracking-widest mb-4">เปลี่ยนรหัสผ่าน</h1>
            <p class="text-center text-gray-400 text-sm mb-10">กรอกอีเมลที่ใช้สมัครสมาชิก เพื่อรับรหัส OTP สำหรับตั้งรหัสใหม่</p>
            
            <form id="forgotForm" class="max-w-sm mx-auto space-y-6">
                <div>
                    <label class="block text-[13px] font-medium text-[#0a9da7] mb-1.5 ml-4">Email | อีเมล</label>
                    <input type="email" id="email" placeholder="Enter your email" required
                           class="w-full px-5 py-3 bg-[#f8fafc] border border-gray-100 rounded-full shadow-inner focus:outline-none focus:ring-2 focus:ring-[#f1c443] transition text-sm">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-[#f36942] hover:bg-[#ffd25a] text-[#fff] tracking-widest py-3.5 rounded-full font-Regular active:scale-[0.98] transition-all shadow-lg">
                    ส่งรหัส OTP
                </button>

                <div class="text-center mt-6">
                    <a href="login.html" class="text-sm text-gray-400 hover:text-[#f36942] transition">กลับไปหน้าเข้าสู่ระบบ</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');

            btn.innerText = "กำลังตรวจสอบ...";
            btn.disabled = true;

            try {
                const response = await fetch('/forgot-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('resetEmail', email);
                    alert("ส่งรหัส OTP ไปที่อีเมลแล้วค่ะ");
                    window.location.href = 'forgot-otp.html';
                } else {
                    alert(data.message);
                    btn.innerText = "ส่งรหัส OTP";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("ติดต่อเซิร์ฟเวอร์ไม่ได้");
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
