<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Moodiary - My Diary</title>
    <style>
        @font-face { font-family: 'biscuit2'; src: url('../assets/fonts/biscuit2.ttf') format('opentype'); }
        body { font-family: 'biscuit2', sans-serif; transition: background-color 0.3s; }
        .sidebar-item:hover { color: #f1c443; cursor: pointer; transition: 0.3s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .emoji-select { opacity: 0.5; cursor: pointer; }
        .emoji-select.active { opacity: 1; transform: scale(1.2); }
        .month-card { cursor: pointer; transition: all 0.2s; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="flex h-screen overflow-hidden bg-[#e2ddc7] dark:bg-[#121212] transition-colors duration-300">

    <div class="w-64 bg-[#e2ddc7] dark:bg-[#1a1a1a] flex flex-col p-8 transition-colors">
        <div class="mb-12">
            <div class="w-16 h-16 bg-gray-600 rounded-xl mb-4 overflow-hidden shadow-lg">
                <img id="navProfilePic" src="https://via.placeholder.com/200" alt="profile" class="w-full h-full object-cover">
            </div>
            <h2 id="navUsername" class="text-[#0a9da7] text-xl font-bold uppercase">Loading...</h2>
            <p id="navEmail" class="text-[#0a9da7] text-[10px] opacity-80">Loading...</p>
        </div>
        <nav class="space-y-6 text-[#0a9da7]">
            <div onclick="location.href='home.html'" class="sidebar-item">หน้าแรก</div>
            <div onclick="location.href='analyze.html'" class="sidebar-item">วิเคราะห์</div>
            <div onclick="location.href='diary.html'" class="sidebar-item text-[#f1c443] font-bold">บันทึก</div>
            <div onclick="location.href='overview.html'" class="sidebar-item">ภาพรวม</div>
            <div onclick="location.href='recommend.html'" class="sidebar-item">คำแนะนำ</div>
            <div onclick="location.href='profile.html'" class="sidebar-item">บัญชีผู้ใช้</div>
        </nav>
        <div class="mt-auto">
            <button onclick="logout()" class="text-[#f36942] text-sm hover:text-red-500 transition-colors">ออกจากระบบ</button>
        </div>
    </div>

    <div class="flex-1 p-8 overflow-y-auto no-scrollbar">
        <div class="max-w-4xl mx-auto bg-white dark:bg-[#1a1a1a] rounded-[3rem] p-10 shadow-xl text-[#1a1a1a] dark:text-white transition-all duration-300">
            <h1 class="text-4xl font-bold mb-2 text-[#0a9da7] dark:text-[#0a9da7]">บันทึกของฉัน</h1>
            <p id="monthLabel" class="text-gray-400 dark:text-gray-500 mb-10">บันทึกทั้งหมดของคุณถูกรวบรวมไว้ที่นี่</p>
            <div class="space-y-12" id="diaryItemsContainer">
                <p class="text-center text-gray-400">กำลังโหลดบันทึกของคุณ...</p>
            </div>
        </div>
    </div>

    <div class="w-80 bg-[#e2ddc7]/50 dark:bg-[#1a1a1a]/80 p-8 overflow-y-auto no-scrollbar flex flex-col transition-colors border-l dark:border-white/5">
        <div class="mb-10">
            <button onclick="openAddModal()" class="w-full bg-[#f36942] hover:bg-[#ffd25a] text-white py-4 rounded-[1.5rem] font-Regular shadow-lg transition-all flex items-center justify-center gap-2">
                <span class="text-xl">+</span> เพิ่มการบันทึกย้อนหลัง
            </button>
        </div>
        <h2 class="text-2xl font-Regular mb-6 text-[#0a9da7] dark:text-white">เดือน</h2>
        <div class="space-y-4" id="monthFilterContainer">
            </div>
    </div>

    <div id="recordModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60]">
        <div class="bg-white dark:bg-[#1a1a1a] rounded-[3rem] p-8 w-[90%] max-w-lg shadow-2xl relative text-[#1a1a1a] dark:text-[#0a9da7] transition-all border dark:border-white/10">
            <h2 id="modalTitle" class="text-2xl font-bold mb-4 text-[#0a9da7]">บันทึกย้อนหลัง</h2>
            
            <label class="block text-xs font-Regular text-gray-400 mb-1 ml-2">เลือกวันที่</label>
            <input type="date" id="recordDate" class="w-full mb-4 p-3 border border-gray-100 dark:border-white/10 bg-gray-50 dark:bg-white/5 rounded-2xl outline-none focus:ring-2 focus:ring-[#0a9da7] dark:text-white">
            
            <label class="block text-xs font-Regular text-gray-400 mb-1 ml-2">ข้อความบันทึก</label>
            <textarea id="recordText" placeholder="วันนี้เป็นอย่างไรบ้าง..." class="w-full h-40 p-4 border border-gray-100 dark:border-white/10 bg-gray-50 dark:bg-white/5 rounded-2xl mb-4 resize-none outline-none focus:ring-2 focus:ring-[#0a9da7] dark:text-white"></textarea>
            
            <div class="flex flex-col mb-6 gap-3">
                <div class="flex justify-between items-center">
                    <div id="emojiGroup" class="flex gap-3">
                        <button type="button" class="emoji-select text-3xl" data-mood="มีความสุข" onclick="selectEmoji(this, '😆')">😆</button>
                        <button type="button" class="emoji-select text-3xl" data-mood="มีความรัก" onclick="selectEmoji(this, '😍')">😍</button>
                        <button type="button" class="emoji-select text-3xl" data-mood="โอเคดี" onclick="selectEmoji(this, '😐')">😐</button>
                        <button type="button" class="emoji-select text-3xl" data-mood="โกรธ" onclick="selectEmoji(this, '😡')">😡</button>
                        <button type="button" class="emoji-select text-3xl" data-mood="กังวล" onclick="selectEmoji(this, '😰')">😰</button>
                        <button type="button" class="emoji-select text-3xl" data-mood="เศร้า" onclick="selectEmoji(this, '😭')">😭</button>
                    </div>
                    <button type="button" onclick="analyzeCurrentText()" id="analyzeBtn" class="px-4 py-2 bg-cyan-50 dark:bg-cyan-900/30 text-[#0a9da7] rounded-xl text-xs font-bold border border-cyan-100">
                        🔍 วิเคราะห์อารมณ์
                    </button>
                </div>
                <div id="predictionBox" class="hidden text-center p-2 bg-gray-50 dark:bg-white/5 rounded-xl border border-dashed border-gray-200 dark:border-white/10">
                    <span id="predictionResult" class="text-sm font-bold text-[#0a9da7]"></span>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="toggleModal()" class="flex-1 py-3 bg-gray-100 dark:bg-white/10 rounded-2xl text-gray-500">ยกเลิก</button>
                <button id="modalSubmitBtn" class="flex-1 py-3 bg-[#0a9da7] dark:bg-[#f1c443] text-white dark:text-black font-bold rounded-2xl">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        const AI_MODEL_URL = 'http://localhost:5000/predict';

        let selectedMoodEmoji = "โอเคดี";
        let selectedEmojiChar = "😐";
        let editingId = null; 
        let isTextAnalyzed = 0; 
        let currentFilter = { month: null, year: null }; 

        const aiMoodMap = {
            'มีความรัก': { mood: 'มีความรัก', emoji: '😍' },
            'มีความสุข': { mood: 'มีความสุข', emoji: '😆' },
            'โกรธ': { mood: 'โกรธ', emoji: '😡' },
            'เศร้า': { mood: 'เศร้า', emoji: '😭' },
            'กังวล': { mood: 'กังวล', emoji: '😰' },
            'ปกติ': { mood: 'โอเคดี', emoji: '😐' }
        };

        function getCleanUserId() { return localStorage.getItem('userId') || '1'; }

        async function fetchDiaries() {
            const container = document.getElementById('diaryItemsContainer');
            const userId = getCleanUserId();
            let url = `${API_URL}/api/diaries/${userId}`;
            const params = new URLSearchParams();
            if (currentFilter.month) params.append('month', currentFilter.month);
            if (currentFilter.year) params.append('year', currentFilter.year);
            if (params.toString()) url += `?${params.toString()}`;

            try {
                const res = await fetch(url);
                const result = await res.json();
                if (result.status === "Success") {
                    const diaries = result.data;
                    if (!diaries || diaries.length === 0) {
                        container.innerHTML = `<p class="text-center text-gray-400 py-10">ไม่พบบันทึกในเดือนนี้</p>`;
                        return;
                    }
                    container.innerHTML = diaries.map((item, index) => `
                        <div class="relative pl-4 border-l-2 border-gray-100 dark:border-white/10 pb-10 last:pb-0">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold text-[#f36942] dark:text-gray-300">${formatThaiDate(item.entry_date)}</h3>
                                <div class="relative">
                                    <button onclick="toggleDropdown(event, ${index})" class="text-gray-300 hover:text-gray-600 text-xl font-bold">•••</button>
                                    <div id="dropdown-${index}" class="hidden absolute right-0 mt-2 w-32 bg-white dark:bg-[#2a2a2a] rounded-xl shadow-xl border border-gray-100 dark:border-white/10 z-10 overflow-hidden">
                                        <button onclick='openEditModal(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-white/5 text-blue-500 font-bold">แก้ไข</button>
                                        <button onclick="deleteDiary(${item.id})" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 dark:hover:bg-white/5 text-red-500 font-bold">ลบ</button>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center space-x-6 p-6 bg-gray-50 dark:bg-white/5 rounded-[2rem] hover:shadow-md transition-all">
                                <div class="text-5xl">${item.selected_emoji || '😐'}</div>
                                <div>
                                    <p class="font-bold text-lg text-gray-800 dark:text-white">
                                        ${item.predicted_mood}
                                        ${item.is_analyzed ? '<span class="ml-2 px-2 py-0.5 bg-yellow-100 dark:bg-yellow-500/20 text-yellow-600 dark:text-yellow-400 text-[10px] rounded-full font-bold">AI วิเคราะห์</span>' : ''}
                                    </p>
                                    <p class="text-gray-500 dark:text-gray-400">${item.entry_text || 'ไม่มีข้อความบันทึก'}</p>
                                </div>
                            </div>
                        </div>`).join('');
                }
            } catch (err) { container.innerHTML = `<p class="text-red-500 text-center py-10">เกิดข้อผิดพลาด</p>`; }
        }

        async function fetchMonths() {
            const container = document.getElementById('monthFilterContainer');
            const userId = getCleanUserId();
            try {
                const res = await fetch(`${API_URL}/api/diary-months/${userId}`);
                const result = await res.json();
                if (result.status === "Success") {
                    const monthNamesThai = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                    container.innerHTML = result.data.map(item => {
                        const thaiMonth = monthNamesThai[parseInt(item.month_num) - 1];
                        const isSelected = currentFilter.month == item.month_num && currentFilter.year == item.year_num;
                        
                        return `
                            <div onclick="filterByMonth('${item.month_num}', '${item.year_num}')" 
                                 class="month-card cursor-pointer p-5 rounded-[2rem] shadow-sm border-2 transition-all hover:scale-105 
                                 ${isSelected 
                                    ? 'bg-[#f1c443] border-[#f1c443] shadow-md' 
                                    : 'bg-transparent border-[#0a9da7] dark:border-white/10 text-[#0a9da7] dark:text-white'}">
                                <p class="font-Regular ${isSelected ? 'text-white' : 'text-[#0a9da7] dark:text-white'}">${thaiMonth}</p>
                                <p class="text-[10px] ${isSelected ? 'text-white/60' : 'text-[#0a9da7] dark:text-white/60'}">ปี ${item.year_num}</p>
                            </div>`;
                    }).join('');
                }
            } catch (err) {}
        }

        function filterByMonth(month, year) {
            if (currentFilter.month === month && currentFilter.year === year) {
                currentFilter = { month: null, year: null };
                document.getElementById('monthLabel').innerText = "บันทึกทั้งหมดของคุณถูกรวบรวมไว้ที่นี่";
            } else {
                currentFilter = { month, year };
                const monthNamesThai = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                document.getElementById('monthLabel').innerText = `บันทึกประจำเดือน ${monthNamesThai[parseInt(month)-1]} ${year}`;
            }
            fetchMonths();
            fetchDiaries();
        }

        // --- Other logic remains the same (Save/Edit/Delete/Analyze) ---
        async function analyzeCurrentText() {
            const text = document.getElementById('recordText').value;
            if (!text.trim()) return alert("พิมพ์ข้อความก่อนนะ!");
            try {
                const res = await fetch(AI_MODEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                document.getElementById('predictionBox').classList.remove('hidden');
                document.getElementById('predictionResult').innerText = "ผลวิเคราะห์: " + data.label;
                const mapped = aiMoodMap[data.label] || aiMoodMap['ปกติ'];
                selectEmoji(document.querySelector(`[data-mood="${mapped.mood}"]`), mapped.emoji);
                isTextAnalyzed = 1;
            } catch (err) { alert("เชื่อมต่อ AI ไม่ได้"); }
        }

        async function saveDiary() {
            const payload = getPayload();
            if(!payload) return;
            const res = await fetch(`${API_URL}/api/save-diary`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if ((await res.json()).status === "Success") {
                toggleModal(); fetchDiaries(); fetchMonths();
            }
        }

        async function updateDiary() {
            const payload = getPayload();
            if(!payload) return;
            const res = await fetch(`${API_URL}/api/update-diary/${editingId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if ((await res.json()).status === "Success") {
                toggleModal(); fetchDiaries(); fetchMonths();
            }
        }

        async function deleteDiary(id) {
            if (!confirm("ลบบันทึกนี้ใช่หรือไม่?")) return;
            const res = await fetch(`${API_URL}/api/delete-diary/${id}`, { method: 'DELETE' });
            if ((await res.json()).status === "Success") { fetchDiaries(); fetchMonths(); }
        }

        function selectEmoji(btn, emoji) {
            document.querySelectorAll('.emoji-select').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            selectedMoodEmoji = btn.getAttribute('data-mood');
            selectedEmojiChar = emoji;
        }

        function formatThaiDate(dateStr) { return new Date(dateStr).toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); }
        function toggleModal() { document.getElementById('recordModal').classList.toggle('hidden'); }
        function toggleDropdown(event, id) {
            event.stopPropagation();
            const dropdown = document.getElementById(`dropdown-${id}`);
            document.querySelectorAll('[id^="dropdown-"]').forEach(el => { if (el !== dropdown) el.classList.add('hidden'); });
            dropdown.classList.toggle('hidden');
        }

        function getPayload() {
            const text = document.getElementById('recordText').value;
            const date = document.getElementById('recordDate').value;
            if (!text || !date) return alert("กรอกข้อมูลให้ครบ!");
            return { user_id: getCleanUserId(), date, text, mood: selectedMoodEmoji, emoji: selectedEmojiChar, is_analyzed: isTextAnalyzed };
        }

        function openAddModal() {
            editingId = null; isTextAnalyzed = 0;
            document.getElementById('modalTitle').innerText = "บันทึกย้อนหลัง";
            document.getElementById('recordDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('recordText').value = "";
            document.getElementById('predictionBox').classList.add('hidden');
            document.getElementById('modalSubmitBtn').onclick = saveDiary;
            selectEmoji(document.querySelector('[data-mood="โอเคดี"]'), '😐');
            toggleModal();
        }

        function openEditModal(item) {
            editingId = item.id; isTextAnalyzed = item.is_analyzed || 0;
            document.getElementById('modalTitle').innerText = "แก้ไขบันทึก";
            document.getElementById('recordDate').value = new Date(item.entry_date).toISOString().split('T')[0];
            document.getElementById('recordText').value = item.entry_text;
            document.getElementById('modalSubmitBtn').onclick = updateDiary;
            const targetBtn = document.querySelector(`[data-mood="${item.predicted_mood || "โอเคดี"}"]`);
            if (targetBtn) selectEmoji(targetBtn, item.selected_emoji || "😐");
            toggleModal();
        }

        async function updateGlobalProfile() {
            try {
                const res = await fetch(`${API_URL}/api/user/${getCleanUserId()}`);
                const data = await res.json();
                if (data.status === "Success") {
                    document.getElementById('navUsername').innerText = data.user.username;
                    document.getElementById('navEmail').innerText = data.user.email;
                    if (data.user.profile_image) document.getElementById('navProfilePic').src = `${API_URL}/uploads/${data.user.profile_image}`;
                }
            } catch (err) {}
        }

        window.onload = () => { updateGlobalProfile(); fetchDiaries(); fetchMonths(); };
        window.onclick = () => document.querySelectorAll('[id^="dropdown-"]').forEach(el => el.classList.add('hidden'));
    </script>
</body>
</html>
