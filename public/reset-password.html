<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ตั้งรหัสผ่านใหม่ - Moodiary</title>
    <style>
        @font-face {
            font-family: 'biscuit2';
            src: url('../assets/fonts/biscuit2.ttf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'biscuit2', sans-serif;
        }
    </style>
</head>
<body class="bg-[#121212] flex items-center justify-center min-h-screen p-4">

    <div class="bg-black w-full max-w-4xl flex flex-col md:flex-row rounded-[2.5rem] overflow-hidden shadow-2xl border border-gray-800">
        
        <!-- Sidebar ด้านข้าง -->
        <div class="md:w-1/4 bg-[#111111] p-8 flex flex-col items-start justify-start border-r border-gray-800">
            <div class="w-12 h-12 bg-white rounded-xl mb-4 shadow-md flex items-center justify-center">
                <span class="text-black font-bold">M</span>
            </div> 
            <h2 class="text-[#f1c443] text-2xl font-medium">Reset</h2>
            <p class="text-gray-500 text-sm mt-1">Password</p>
        </div>

        <!-- ส่วนของฟอร์มกรอกข้อมูล -->
        <div class="md:w-3/4 bg-white p-8 md:p-14">
            <h1 class="text-center text-3xl font-bold text-[#1a1a1a] tracking-widest mb-2">ตั้งรหัสผ่านใหม่</h1>
            <p class="text-center text-gray-400 text-sm mb-10">กรุณากรอกรหัส OTP ที่ได้รับและระบุรหัสผ่านใหม่ของคุณ</p>
            
            <form id="resetForm" class="space-y-5 max-w-md mx-auto">
                <!-- ช่องกรอก OTP -->
                <div>
                    <label class="block text-[13px] font-medium text-gray-600 mb-1.5 ml-4">OTP Code (6 หลัก)</label>
                    <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" required
                           class="w-full px-5 py-4 bg-[#f8fafc] border border-gray-100 rounded-full shadow-inner focus:outline-none focus:ring-2 focus:ring-[#f1c443] transition text-center text-2xl font-bold tracking-[10px]">
                </div>

                <!-- ช่องรหัสผ่านใหม่ -->
                <div>
                    <label class="block text-[13px] font-medium text-gray-600 mb-1.5 ml-4">New Password | รหัสผ่านใหม่</label>
                    <input type="password" id="newPassword" placeholder="Minimum 8 characters" required
                           class="w-full px-5 py-3 bg-[#f8fafc] border border-gray-100 rounded-full shadow-inner focus:outline-none focus:ring-2 focus:ring-[#f1c443] transition text-sm">
                </div>

                <!-- ช่องยืนยันรหัสผ่านใหม่ -->
                <div>
                    <label class="block text-[13px] font-medium text-gray-600 mb-1.5 ml-4">Confirm New Password | ยืนยันรหัสผ่าน</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your new password" required
                           class="w-full px-5 py-3 bg-[#f8fafc] border border-gray-100 rounded-full shadow-inner focus:outline-none focus:ring-2 focus:ring-[#f1c443] transition text-sm">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-[#f1c443] hover:bg-[#ffd25a] text-[#1a1a1a] tracking-widest py-3.5 rounded-full font-semibold mt-6 active:scale-[0.98] transition-all duration-200 shadow-lg shadow-black/5">
                    เปลี่ยนรหัสผ่าน
                </button>
            </form>

            <div class="text-center mt-10">
                <a href="login.html" class="text-sm font-bold text-black hover:underline tracking-wide">กลับสู่หน้า Login</a>
            </div>
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');

        resetForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = localStorage.getItem('resetEmail'); // ดึงเมลจากหน้าที่แล้วมาใช้

            if (!email) {
                alert("เซสชันหมดอายุ กรุณาเริ่มขั้นตอนลืมรหัสผ่านใหม่อีกครั้ง");
                window.location.href = 'forgot-password.html';
                return;
            }

            if (newPassword.length < 8) {
                return alert("รหัสผ่านใหม่ต้องมีความยาวอย่างน้อย 8 ตัวอักษร");
            }

            if (newPassword !== confirmPassword) {
                return alert("การยืนยันรหัสผ่านไม่ตรงกันค่ะ");
            }

            submitBtn.innerText = "กำลังอัปเดต...";
            submitBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:3000/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    alert("เปลี่ยนรหัสผ่านสำเร็จแล้ว! คุณสามารถเข้าสู่ระบบได้ทันที");
                    localStorage.removeItem('resetEmail'); // ลบข้อมูลชั่วคราวทิ้ง
                    window.location.href = 'login.html';
                } else {
                    alert("ผิดพลาด: " + data.message);
                    submitBtn.innerText = "เปลี่ยนรหัสผ่าน";
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error("Error:", error);
                alert("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่ภายหลัง");
                submitBtn.innerText = "เปลี่ยนรหัสผ่าน";
                submitBtn.disabled = false;
            }
            if (!response.ok) {
            if (data.message === "รหัส OTP ไม่ถูกต้องหรือหมดอายุ") {
                alert("รหัส OTP หมดอายุแล้วค่ะ กรุณากลับไปหน้าลืมรหัสผ่านเพื่อขอรหัสใหม่");
                window.location.href = 'forgot-password.html';
            } else {
                alert("ผิดพลาด: " + data.message);
            }
        }
    });
    </script>
</body>
</html>
