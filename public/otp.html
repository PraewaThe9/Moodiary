<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Moodiary - Verify OTP</title>
    <style>
        @font-face { font-family: 'biscuit2'; 
        src: url('../fonts/biscuit2.ttf') format('opentype'); }
        body { font-family: 'biscuit2', sans-serif; }
    </style>
</head>
<body class="bg-[#111111] flex items-center justify-center h-screen">
    <div class="bg-white rounded-[3rem] shadow-2xl flex overflow-hidden max-w-4xl w-full h-[600px]">
        <!-- Left Side (Black) -->
        <div class="w-1/3 bg-[#111111] p-10 text-white flex flex-col justify-start">
            <div class="w-10 h-10 bg-white rounded-lg mb-6"></div>
            <h2 class="text-2xl font-bold text-[#f1c443]">ยืนยันตัวตน</h2>
            <p class="text-gray-400 text-xs mt-2">กรุณากรอกรหัส OTP ที่เราส่งไปยังอีเมลของคุณ</p>
        </div>

        <!-- Right Side (OTP Input) -->
        <div class="w-2/3 p-16 flex flex-col items-center justify-center">
            <h1 class="text-4xl font-bold text-[#f1c443] mb-4">กรอกรหัส OTP</h1>
            <p id="targetEmail" class="text-gray-400 mb-10 text-sm">เราส่งรหัสไปที่: user@email.com</p>

            <div class="flex gap-4 mb-10">
                <!-- ช่องกรอก OTP แบบแยกช่อง -->
                <input type="text" maxlength="1" class="otp-input w-12 h-16 border-2 border-gray-300 rounded-xl text-center text-2xl font-bold focus:border-[#f1c443] outline-none transition-all">
                <input type="text" maxlength="1" class="otp-input w-12 h-16 border-2 border-gray-300 rounded-xl text-center text-2xl font-bold focus:border-[#f1c443] outline-none transition-all">
                <input type="text" maxlength="1" class="otp-input w-12 h-16 border-2 border-gray-300 rounded-xl text-center text-2xl font-bold focus:border-[#f1c443] outline-none transition-all">
                <input type="text" maxlength="1" class="otp-input w-12 h-16 border-2 border-gray-300 rounded-xl text-center text-2xl font-bold focus:border-[#f1c443] outline-none transition-all">
                <input type="text" maxlength="1" class="otp-input w-12 h-16 border-2 border-gray-300 rounded-xl text-center text-2xl font-bold focus:border-[#f1c443] outline-none transition-all">
                <input type="text" maxlength="1" class="otp-input w-12 h-16 border-2 border-gray-300 rounded-xl text-center text-2xl font-bold focus:border-[#f1c443] outline-none transition-all">
            </div>

            <button onclick="verifyOTP()" class="w-full py-4 bg-[#f1c443] text-[#1a1a1a] font-bold rounded-full shadow-lg hover:scale-105 transition-transform mb-6">
                ยืนยันรหัส
            </button>
            
            <p class="text-gray-400 text-xs">หากไม่ได้รับรหัส? <span class="text-[#f1c443] cursor-pointer hover:underline">ส่งอีกครั้ง</span></p>
        </div>
    </div>

    <script>
    const userEmail = localStorage.getItem('tempEmail');
    document.getElementById('targetEmail').innerText = "เราส่งรหัสไปที่: " + (userEmail || 'ไม่พบอีเมล');

    const otpInputs = document.querySelectorAll('.otp-input');

    async function verifyOTP() {
        let code = "";
        otpInputs.forEach(input => code += input.value);

        if (code.length < 6) {
            alert("กรุณากรอกรหัสให้ครบ 6 หลัก");
            return;
        }

        try {
            // --- ส่งรหัสไปให้ Server ตรวจสอบ ---
            const response = await fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: userEmail, 
                    otp: code 
                })
            });

            const data = await response.json();

            if (response.ok) {
                alert("สมัครสมาชิกสำเร็จ! ยินดีต้อนรับสู่ Moodiary");
                // เก็บชื่อผู้ใช้ถ้า Server ส่งกลับมา (หรือเก็บจากหน้า Register)
                window.location.href = 'home.html'; 
            } else {
                alert(data.message); // จะโชว์ว่า "รหัส OTP ไม่ถูกต้องหรือหมดอายุแล้ว"
                otpInputs.forEach(input => input.value = "");
                otpInputs[0].focus();
            }
        } catch (error) {
            console.error("Error:", error);
            alert("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้");
        }
    }

    // ระบบเลื่อนช่องอัตโนมัติ
    otpInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (input.value && index < otpInputs.length - 1) otpInputs[index + 1].focus();
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && index > 0) otpInputs[index - 1].focus();
        });
    });
</script>
</body>
</html>
