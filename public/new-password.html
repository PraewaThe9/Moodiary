<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ตั้งรหัสผ่านใหม่ - Moodiary</title>
    <style>
        @font-face { font-family: 'biscuit2'; 
        src: url('../fonts/biscuit2.ttf') format('opentype'); }
        body { font-family: 'biscuit2', sans-serif; }
    </style>
</head>
<body class="bg-[#e7e1ca] flex items-center justify-center min-h-screen p-4">
    <div class="bg-black w-full max-w-4xl flex flex-col md:flex-row rounded-[2.5rem] overflow-hidden shadow-2xl ">
        <!-- Sidebar -->
        <div class="md:w-[25%] bg-[#e7e1ca] p-10 flex flex-col items-start justify-start ">
            <div class="w-14 h-14 bg-white rounded-2xl mb-6 shadow-lg shadow-white/5 flex items-center justify-center overflow-hidden">
    <img src="images/Moodairylogo.png" alt="Logo" class="w-full h-full object-contain p-2">
</div> 
            <h2 class="text-[#f36942] text-2xl font-medium">New</h2>
            <p class="text-[#0a9da7] text-sm mt-1">Password</p>
        </div>

        <div class="md:w-3/4 bg-white p-8 md:p-14">
            <h1 class="text-center text-3xl font-bold text-[#0a9da7] mb-10">รหัสผ่านใหม่</h1>
            <form id="newPassForm" class="max-w-sm mx-auto space-y-5">
                <div>
                    <label class="block text-[13px] text-[#0a9da7] mb-1 ml-4">ระบุรหัสผ่านใหม่</label>
                    <input type="password" id="newPassword" required class="w-full px-5 py-3 bg-[#f8fafc] border rounded-full focus:ring-2 focus:ring-[#f1c443] outline-none">
                </div>
                <div>
                    <label class="block text-[13px] text-[#0a9da7] mb-1 ml-4">ยืนยันรหัสผ่านใหม่อีกครั้ง</label>
                    <input type="password" id="confirmPassword" required class="w-full px-5 py-3 bg-[#f8fafc] border rounded-full focus:ring-2 focus:ring-[#f1c443] outline-none">
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-[#f36942] hover:bg-[#ffd25a] text-[#fff] py-3.5 rounded-full font-Regular shadow-lg">บันทึกรหัสผ่าน</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('newPassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = localStorage.getItem('resetEmail');
            const otp = localStorage.getItem('tempOTP');

            if (newPassword !== confirmPassword) return alert("รหัสผ่านไม่ตรงกัน");
            if (newPassword.length < 8) return alert("รหัสผ่านต้อง 8 ตัวขึ้นไป");

            try {
                const response = await fetch('http://localhost:3000/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, otp, newPassword })
                });
                const data = await response.json();
                if (response.ok) {
                    alert("เปลี่ยนรหัสผ่านสำเร็จ!");
                    localStorage.clear();
                    window.location.href = 'login.html';
                } else {
                    alert(data.message);
                }
            } catch (err) { alert("ติดต่อเซิร์ฟเวอร์ไม่ได้"); }
        });
    </script>
</body>
</html>
